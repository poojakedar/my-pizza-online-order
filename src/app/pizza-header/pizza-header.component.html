<header class="sticky top-0 z-50 shadow-lg"
        style="background: linear-gradient(135deg, #1d1e2c 0%, #2b2d42 100%); border-bottom: 1px solid rgba(230,57,70,0.3);">
  <mat-toolbar class="!bg-transparent !px-6 !h-16">
    <!-- Brand -->
    <a routerLink="/menu" class="flex items-center gap-3 no-underline group">
      <span class="text-2xl">🍕</span>
      <span class="font-bold text-xl tracking-tight"
            style="font-family: 'Playfair Display', serif; color: #e63946;">
        PizzaCraft
      </span>
    </a>

    <span class="flex-1"></span>

    <!-- Nav links -->
    <nav class="flex items-center gap-2">
      <a routerLink="/menu" routerLinkActive="active-link"
         mat-button class="!text-gray-300 hover:!text-white !rounded-full">
        <mat-icon class="!text-sm mr-1">restaurant_menu</mat-icon>
        Menu
      </a>
      <button mat-icon-button
              style="color: #e63946;"
              aria-label="Cart">
        <mat-icon>shopping_cart</mat-icon>
      </button>
    </nav>
  </mat-toolbar>
</header>
