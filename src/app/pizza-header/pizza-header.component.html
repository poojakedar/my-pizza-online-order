<header class="header">
  <mat-toolbar class="header-toolbar">
    <!-- Brand -->
    <a routerLink="/menu" class="brand no-underline">
      <span class="brand-icon">🍕</span>
      <span class="brand-name brand-font">PizzaCraft</span>
    </a>

    <span class="flex-1"></span>

    <!-- Nav links -->
    <nav class="flex items-center gap-1">
      <a routerLink="/menu" routerLinkActive="active-link"
         mat-button class="nav-link">
        <mat-icon class="mr-1" style="font-size:18px;width:18px;height:18px;">restaurant_menu</mat-icon>
        Menu
      </a>

      <!-- Theme toggle -->
      <button mat-icon-button
              class="theme-toggle"
              [matTooltip]="themeService.isDark() ? 'Switch to Light mode' : 'Switch to Dark mode'"
              (click)="themeService.toggleTheme()"
              aria-label="Toggle theme">
        <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <!-- Cart -->
      <a routerLink="/cart" mat-icon-button
         class="cart-btn"
         [matBadge]="cartService.totalItems()"
         matBadgeColor="accent"
         [matBadgeHidden]="cartService.totalItems() === 0"
         aria-label="Cart">
        <mat-icon>shopping_cart</mat-icon>
      </a>
    </nav>
  </mat-toolbar>
</header>
